<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Verdana', sans-serif;
        }

        body {
            display: flex;
            min-height: 100vh;
            background-image: url('https://i.pinimg.com/originals/55/ce/51/55ce511be59f50688ced046ab49d2a35.gif');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
        }

        .sidebar {
            width: 300px;
            height: 100vh;
            position: sticky;
            top: 0;
            display: flex;
            flex-direction: column;
            padding: 30px;

            background-image: url('https://i.pinimg.com/736x/eb/1d/dc/eb1ddc04bac26d6b27b4476447449b8c.jpg');
            background-size: cover;
            background-position: center;
            background-color: rgba(243, 234, 234, 0.7);
            background-blend-mode: overlay;
            backdrop-filter: blur(8px);
        }

        .logo {
            display: flex;
            justify-content: center;
            margin-bottom: 40px;
        }

        .logo img {
            max-width: 100%;
        }

        .navlinks {
            display: flex;
            flex-direction: column;
            gap: 10px;
            font-weight: bold;
        }

        .navlinks a {
            text-decoration: none;
            color: #1a1a1a;
            padding: 10px;
            border-radius: 8px;
            transition: 0.3s;
        }

        .navlinks a:hover {
            background: rgba(0,0,0,0.1);
            transform: translateX(5px);
        }

        .main-content {
            flex: 1;
            padding: 40px;
        }

        .profile-card {
            max-width: 600px;
            margin: auto;
            background: rgba(255,255,255,0.9);
            border-radius: 15px;
            padding: 30px;
            text-align: center;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
        }

        .profile-card img {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            object-fit: cover;
            margin-bottom: 20px;
        }

        h2 {
            font-weight: bold;
            color: #2c3e50;
        }

        .info {
            text-align: left;
            margin-top: 20px;
        }

        .info p {
            margin: 8px 0;
        }

        .footer {
            text-align: center;
            padding: 15px;
            color: white;
            margin-top: 30px;
        }

        @media (max-width: 768px) {
            body {
                flex-direction: column;
            }

            .sidebar {
                width: 100%;
                height: auto;
                opacity: 0.6;
            }
        }
    </style>
</head>

<body>

    <div class="sidebar">
        <div class="logo">
            <img src="aot logo.png">
        </div>

        <div class="navlinks">
            <a href="dashboard.html">DASHBOARD</a>
            <a href="notebooks.html">VIRTUAL NOTEBOOKS</a>
            <a href="profile.html">PROFILE</a>
            <a href="tasks.html">TASKS</a>
            <a href="index.html">LOG OUT</a>
        </div>
    </div>

    <div class="main-content">

        <div class="profile-card">
            <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRWH8Is0NRGnDOev4cJEep38659R6cg9PrrOQ&s" alt="Profile Picture">

            <h2>Levi Ackerman</h2>
            <p><i>Scout Regiment</i></p>

            <div class="info">
                <p><strong>Student ID:</strong> 104th-Training-001</p>
                <p><strong>Section:</strong> Scout Regiment</p>
                <p><strong>Email:</strong> levi@aot.edu</p>
                <p><strong>Specialization:</strong>World's Strongest Soldier</p>
            </div>
        </div>

        <div class="footer">
            Apelo, Bunag, Cunanan | 9-Emerald @2026
        </div>

    </div>

</body>
</html>
